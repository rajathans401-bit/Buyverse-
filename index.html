<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyverse - Your Online Store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #007bff; color: white; padding: 15px; text-align: center; }
        nav { background: #0056b3; padding: 10px; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
        .hero { padding: 50px; background: url('hero-bg.jpg') no-repeat center center/cover; text-align: center; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 20px; }
        .product { border: 1px solid #ccc; padding: 10px; text-align: center; }
        footer { background: #007bff; color: white; text-align: center; padding: 10px; position: relative; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <header>
        <h1>Buyverse</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#products">Products</a>
            <a href="#cart">Cart</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <div class="hero">
        <h2>Welcome to Your Online Store</h2>
        <p>Shop the best products at unbeatable prices!</p>
    </div>
    <div class="products">
        <!-- Example of a product -->
        <div class="product">
            <h3>Product 1</h3>
            <p>$19.99</p>
            <button onclick="addToCart('Product 1', 19.99)">Add to Cart</button>
        </div>
        <div class="product">
            <h3>Product 2</h3>
            <p>$29.99</p>
            <button onclick="addToCart('Product 2', 29.99)">Add to Cart</button>
        </div>
        <!-- Add more products as necessary -->
    </div>
    <footer>
        <p>&copy; 2026 Buyverse. All rights reserved.</p>
    </footer>
    <script>
        let cart = [];

        function addToCart(productName, productPrice) {
            cart.push({ name: productName, price: productPrice });
            alert(productName + ' has been added to your cart!');
            console.log(cart);
        }
    </script>
</body>
</html>
